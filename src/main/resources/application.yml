spring:
  application:
    name: multicam-api
  codec:
    max-in-memory-size: 20MB
  r2dbc:
    url: r2dbc:h2:file:///./data/multicamdb;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  cache:
    redis:
      time-to-live: 10m
      type: redis
  data:
    redis:
      host: localhost
      port: 6379
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

logging:
  level:
    org:
      springframework:
        web: DEBUG
        data:
          r2dbc: DEBUG

server:
  port: 8080

llm:
  local:
    base-url: http://127.0.0.1:8000
    model: Qwen/Qwen3-VL-2B-Instruct
    temperature: 0.01
    connect-timeout-ms: 10000
    response-timeout-seconds: 1800

deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com
    model: deepseek-chat
    temperature: 0.1
    max-tokens: 4096
    connect-timeout-ms: 10000
    response-timeout-seconds: 120

app:
  secret: ${JWT_SECRET:o678t7rf@&^$^gdbcduiofjdskfnm093204JHSBc}
  lifetime: 3600000